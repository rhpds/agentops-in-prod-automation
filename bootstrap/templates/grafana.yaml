---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: grafana
  namespace: openshift-gitops
spec:
  generators:
    - list:
        elements:
        {{- range $index := until (int .Values.user.count) }}
          - user: {{ $.Values.user.prefix }}{{ add $index 1 }}
        {{- end }}
  template:
    metadata:
      name: grafana-{{ `{{ user }}` }}
      namespace: openshift-gitops
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: {{ .Values.bootstrap.repoURL }}
        targetRevision: {{ .Values.bootstrap.targetRevision }}
        path: deployments/grafana
        helm:
          values: |
            username: {{ `{{ user }}` }}
      destination:
        name: in-cluster
        namespace: wksp-{{ `{{ user }}` }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - RespectIgnoreDifferences=true
          - CreateNamespace=true
        managedNamespaceMetadata:
          labels:
            argocd.argoproj.io/managed-by: openshift-gitops
      ignoreDifferences:
        - kind: Secret
          name: grafana-proxy
          jsonPointers:
            - /data/session_secret
