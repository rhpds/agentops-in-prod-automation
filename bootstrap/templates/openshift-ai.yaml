---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-ai
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: in-cluster
    namespace: redhat-ods-operator
  project: default
  source:
    path: deployments/openshift-ai
    repoURL: {{ .Values.bootstrap.repoURL }}
    targetRevision: {{ .Values.bootstrap.targetRevision }}
    helm:
      valuesObject:
        admins:
          {{- range $i := until (int .Values.user.count) }}
          - "{{ $.Values.user.prefix }}{{ add $i 1 }}"
          {{- end }}
  ignoreDifferences:
    - group: datasciencecluster.opendatahub.io
      kind: DataScienceCluster
      jsonPointers:
        - /spec/components
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
