---
# RBAC for the PostSync Job to create the grafana-auth-secret
# grafana-sa needs permissions to create secrets and request service account tokens
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-token-creator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create"]
- apiGroups: [""]
  resources: ["serviceaccounts/token"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-token-creator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: grafana-token-creator
subjects:
- kind: ServiceAccount
  name: grafana-sa
  namespace: {{ .Release.Namespace }}
---
# Job to create a long-lived token for Grafana service account
# Required because kubernetes.io/service-account-token secrets no longer auto-populate in K8s 1.24+
apiVersion: batch/v1
kind: Job
metadata:
  name: create-grafana-token
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: grafana-sa
      containers:
      - name: create-token
        image: registry.redhat.io/openshift4/ose-cli:v4.14
        command:
        - /bin/bash
        - -c
        - |
          # Check if secret already exists
          if oc get secret grafana-auth-secret -n {{ .Release.Namespace }} 2>/dev/null; then
            echo "Secret grafana-auth-secret already exists"
            exit 0
          fi
          # Create token and secret
          TOKEN=$(oc create token grafana-sa -n {{ .Release.Namespace }} --duration=8760h)
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to create token for grafana-sa"
            exit 1
          fi
          oc create secret generic grafana-auth-secret -n {{ .Release.Namespace }} --from-literal=token="$TOKEN"
          echo "Created grafana-auth-secret"
      restartPolicy: Never
  backoffLimit: 3
