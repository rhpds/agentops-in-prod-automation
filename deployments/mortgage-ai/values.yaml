# Default values for mortgage-ai
#
# Override patterns:
#   External DB:        --set database.enabled=false
#                       --set secrets.DATABASE_URL=postgresql+asyncpg://...
#   External Keycloak:  --set keycloak.enabled=false
#                       --set secrets.KEYCLOAK_URL=https://...
#   External MinIO/S3:  --set minio.enabled=false
#                       --set secrets.S3_ENDPOINT=https://...
global:
  imageRegistry: quay.io
  imageRepository: rh-ai-quickstart
  imageTag: "0.1.9"
  imagePullPolicy: Always
  storageClass: ""

# Secrets -- override these for real deployments via --set or external Secret
secrets:
  # Database secrets
  POSTGRES_DB: "mortgage-ai"
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "changeme"

  # API secrets
  DATABASE_URL: "postgresql+asyncpg://user:changeme@mortgage-ai-db:5432/mortgage-ai"
  COMPLIANCE_DATABASE_URL: "postgresql+asyncpg://compliance_app:compliance_pass@mortgage-ai-db:5432/mortgage-ai"
  DEBUG: "false"
  ALLOWED_HOSTS: '["*"]'
  COMPANY_NAME: "Red Hat AI Quickstart Demo"
  AGENT_NAME: ""

  # Auth (Keycloak) -- set AUTH_DISABLED=true to bypass for demo
  AUTH_DISABLED: "false"
  KEYCLOAK_URL: "http://keycloak:8080"
  KEYCLOAK_ISSUER: ""
  KEYCLOAK_REALM: "mortgage-ai"
  KEYCLOAK_CLIENT_ID: "mortgage-ai-ui"
  JWKS_CACHE_TTL: "300"

  # Storage (S3 / MinIO)
  S3_ENDPOINT: "http://minio:9000"
  S3_ACCESS_KEY: "minio"
  S3_SECRET_KEY: "miniosecret"
  S3_BUCKET: "documents"
  S3_REGION: "us-east-1"
  UPLOAD_MAX_SIZE_MB: "50"

  # LLM
  LLM_API_KEY: "not-needed"
  LLM_BASE_URL: "http://vllm:8000/v1"
  LLM_MODEL_FAST: "gpt-4o-mini"
  LLM_MODEL_CAPABLE: "gpt-4o-mini"
  # Embedding model -- defaults to in-process sentence-transformers.
  # Leave these empty to use the built-in local provider (no external
  # service needed). To use a remote OpenAI-compatible endpoint instead,
  # set EMBEDDING_PROVIDER to "openai_compatible" and provide the URL.
  EMBEDDING_MODEL: ""
  EMBEDDING_PROVIDER: ""
  EMBEDDING_BASE_URL: ""
  EMBEDDING_API_KEY: ""

  # Safety / Shields (optional)
  SAFETY_MODEL: ""
  SAFETY_ENDPOINT: ""
  SAFETY_API_KEY: ""

  # Observability (MLflow) -- leave blank to disable MLflow tracing
  MLFLOW_TRACKING_URI: ""
  MLFLOW_EXPERIMENT_NAME: ""
  MLFLOW_WORKSPACE: ""
  MLFLOW_TRACKING_TOKEN: ""
  MLFLOW_TRACKING_INSECURE_TLS: "false"

  # Admin panel
  SQLADMIN_USER: "admin"
  SQLADMIN_PASSWORD: "admin"
  SQLADMIN_SECRET_KEY: "change-me-in-production"

  # Keycloak admin
  KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
  KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"

  # MinIO
  MINIO_ROOT_USER: "minio"
  MINIO_ROOT_PASSWORD: "miniosecret"

# OpenShift Routes configuration
routes:
  enabled: true
  annotations: {}
  sharedHost: ""  # Set custom hostname or leave empty (will use ui.host fallback)
  ui:
    host: ""  # Used as fallback if sharedHost is empty
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  api:
    host: ""  # Ignored - uses sharedHost or ui.host
    tls:
      enabled: true
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# API configuration
api:
  enabled: true
  name: mortgage-ai-api
  image:
    repository: mortgage-ai-api
    tag: ""
  service:
    type: ClusterIP
    port: 8000
  replicas: 1
  resources:
    requests:
      memory: "1Gi"
      cpu: "200m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
  healthCheck:
    enabled: true
    path: /health/
    initialDelaySeconds: 120
    periodSeconds: 10
    failureThreshold: 6
# UI configuration
ui:
  enabled: true
  name: mortgage-ai-ui
  image:
    repository: mortgage-ai-ui
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  replicas: 1
  resources:
    requests:
      memory: "32Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "250m"
  healthCheck:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
# Database configuration
database:
  enabled: true
  name: mortgage-ai-db
  image:
    repository: pgvector/pgvector
    tag: pg16
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
# Keycloak configuration
keycloak:
  enabled: true
  name: keycloak
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.0"
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1536Mi"
      cpu: "1000m"

# MinIO configuration
minio:
  enabled: true
  name: minio
  image:
    repository: minio/minio
    tag: latest
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "384Mi"
      cpu: "500m"

# MLflow observability (RHOAI 3.4+)
mlflow:
  # RBAC resources for MLflow server access
  rbac:
    enabled: false  # Enable when deploying with RHOAI MLflow
    # Creates: ClusterRole, ServiceAccount, ClusterRoleBinding
    # The ServiceAccount can be used to generate tokens for MLflow auth
    pipelineRunner:
      enabled: false  # Enable when DSPA is deployed in this namespace
      serviceAccountName: pipeline-runner-dspa  # SA created by DSPA operator

# LlamaStack model serving
llamastack:
  enabled: false
  image:
    repository: llamastack/distribution-starter
    tag: latest
  # InferenceService support (OpenShift AI / KServe)
  inferenceService:
    enabled: false
    endpoint: ""
    # Optional: name of existing K8s Secret with 'token' key
    authTokenSecret: ""
  safety:
    enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"

# Seed data (demo data for demos / dev environments)
seed:
  enabled: false

# ServiceAccount
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod Security Context
podSecurityContext: {}

# Security Context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
