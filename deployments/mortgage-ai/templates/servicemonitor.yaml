{{- if .Values.api.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.api.name }}
  labels:
    {{- include "mortgage-ai.api.labels" . | nindent 4 }}
spec:
  endpoints:
    - port: http
      path: /metrics/
      interval: 30s
  selector:
    matchLabels:
      {{- include "mortgage-ai.api.selectorLabels" . | nindent 6 }}
{{- end }}
