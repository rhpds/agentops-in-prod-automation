apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mortgage-ai.fullname" . }}-secret
  labels:
    {{- include "mortgage-ai.labels" . | nindent 4 }}
type: Opaque
data:
  # Database
  POSTGRES_DB: {{ .Values.secrets.POSTGRES_DB | toString | b64enc | quote }}
  POSTGRES_USER: {{ .Values.secrets.POSTGRES_USER | toString | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.POSTGRES_PASSWORD | toString | b64enc | quote }}

  # API -- database
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | toString | b64enc | quote }}
  COMPLIANCE_DATABASE_URL: {{ .Values.secrets.COMPLIANCE_DATABASE_URL | toString | b64enc | quote }}
  DEBUG: {{ .Values.secrets.DEBUG | toString | b64enc | quote }}
  ALLOWED_HOSTS: {{ .Values.secrets.ALLOWED_HOSTS | toString | b64enc | quote }}
  COMPANY_NAME: {{ .Values.secrets.COMPANY_NAME | toString | b64enc | quote }}
  AGENT_NAME: {{ .Values.secrets.AGENT_NAME | toString | b64enc | quote }}

  # API -- auth
  AUTH_DISABLED: {{ .Values.secrets.AUTH_DISABLED | toString | b64enc | quote }}
  KEYCLOAK_URL: {{ .Values.secrets.KEYCLOAK_URL | toString | b64enc | quote }}
  {{- $kcIssuer := .Values.secrets.KEYCLOAK_ISSUER }}
  {{- if and (not $kcIssuer) .Values.keycloak.enabled .Values.routes.enabled .Values.routes.sharedHost }}
  {{- $kcIssuer = printf "https://keycloak-%s" .Values.routes.sharedHost }}
  {{- end }}
  KEYCLOAK_ISSUER: {{ $kcIssuer | toString | b64enc | quote }}
  KEYCLOAK_REALM: {{ .Values.secrets.KEYCLOAK_REALM | toString | b64enc | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.secrets.KEYCLOAK_CLIENT_ID | toString | b64enc | quote }}
  JWKS_CACHE_TTL: {{ .Values.secrets.JWKS_CACHE_TTL | toString | b64enc | quote }}

  # API -- S3 / MinIO
  S3_ENDPOINT: {{ .Values.secrets.S3_ENDPOINT | toString | b64enc | quote }}
  S3_ACCESS_KEY: {{ .Values.secrets.S3_ACCESS_KEY | toString | b64enc | quote }}
  S3_SECRET_KEY: {{ .Values.secrets.S3_SECRET_KEY | toString | b64enc | quote }}
  S3_BUCKET: {{ .Values.secrets.S3_BUCKET | toString | b64enc | quote }}
  S3_REGION: {{ .Values.secrets.S3_REGION | toString | b64enc | quote }}
  UPLOAD_MAX_SIZE_MB: {{ .Values.secrets.UPLOAD_MAX_SIZE_MB | toString | b64enc | quote }}

  # API -- LLM
  LLM_API_KEY: {{ .Values.secrets.LLM_API_KEY | toString | b64enc | quote }}
  LLM_BASE_URL: {{ .Values.secrets.LLM_BASE_URL | toString | b64enc | quote }}
  LLM_MODEL_FAST: {{ .Values.secrets.LLM_MODEL_FAST | toString | b64enc | quote }}
  LLM_MODEL_CAPABLE: {{ .Values.secrets.LLM_MODEL_CAPABLE | toString | b64enc | quote }}
  EMBEDDING_MODEL: {{ .Values.secrets.EMBEDDING_MODEL | toString | b64enc | quote }}
  EMBEDDING_PROVIDER: {{ .Values.secrets.EMBEDDING_PROVIDER | toString | b64enc | quote }}
  EMBEDDING_BASE_URL: {{ .Values.secrets.EMBEDDING_BASE_URL | toString | b64enc | quote }}
  EMBEDDING_API_KEY: {{ .Values.secrets.EMBEDDING_API_KEY | toString | b64enc | quote }}

  # API -- safety / shields
  SAFETY_MODEL: {{ .Values.secrets.SAFETY_MODEL | toString | b64enc | quote }}
  SAFETY_ENDPOINT: {{ .Values.secrets.SAFETY_ENDPOINT | toString | b64enc | quote }}
  SAFETY_API_KEY: {{ .Values.secrets.SAFETY_API_KEY | toString | b64enc | quote }}

  # API -- MLflow observability
  MLFLOW_TRACKING_URI: {{ .Values.secrets.MLFLOW_TRACKING_URI | toString | b64enc | quote }}
  MLFLOW_EXPERIMENT_NAME: {{ .Values.secrets.MLFLOW_EXPERIMENT_NAME | toString | b64enc | quote }}
  MLFLOW_WORKSPACE: {{ .Values.secrets.MLFLOW_WORKSPACE | toString | b64enc | quote }}
  MLFLOW_TRACKING_TOKEN: {{ .Values.secrets.MLFLOW_TRACKING_TOKEN | toString | b64enc | quote }}
  MLFLOW_TRACKING_INSECURE_TLS: {{ .Values.secrets.MLFLOW_TRACKING_INSECURE_TLS | toString | b64enc | quote }}

  # API -- admin panel
  SQLADMIN_USER: {{ .Values.secrets.SQLADMIN_USER | toString | b64enc | quote }}
  SQLADMIN_PASSWORD: {{ .Values.secrets.SQLADMIN_PASSWORD | toString | b64enc | quote }}
  SQLADMIN_SECRET_KEY: {{ .Values.secrets.SQLADMIN_SECRET_KEY | toString | b64enc | quote }}

  # Keycloak admin
  KC_BOOTSTRAP_ADMIN_USERNAME: {{ .Values.secrets.KC_BOOTSTRAP_ADMIN_USERNAME | toString | b64enc | quote }}
  KC_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secrets.KC_BOOTSTRAP_ADMIN_PASSWORD | toString | b64enc | quote }}

  # MinIO
  MINIO_ROOT_USER: {{ .Values.secrets.MINIO_ROOT_USER | toString | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.secrets.MINIO_ROOT_PASSWORD | toString | b64enc | quote }}
