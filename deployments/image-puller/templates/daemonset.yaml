apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: image-puller
  labels:
    app.kubernetes.io/name: image-puller
    app.kubernetes.io/component: image-cache
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: image-puller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: image-puller
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- range .Values.images }}
        - name: {{ .name }}
          image: {{ .image }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "while true; do sleep 3600; done"]
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
        {{- end }}
      terminationGracePeriodSeconds: 1
      priorityClassName: system-node-critical
