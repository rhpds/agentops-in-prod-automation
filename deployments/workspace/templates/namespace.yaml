---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespacePrefix }}-{{ .Values.username }}
  labels:
    opendatahub.io/dashboard: 'true'
    app.kubernetes.io/component: workspaces-namespace
  annotations:
    openshift.io/display-name: "Workspace {{ .Values.username }}"
    openshift.io/description: "Workspace Namespace"